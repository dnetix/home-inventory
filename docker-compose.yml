services:
    home-inventory:
        build:
            context: .
        container_name: inventory-app
        volumes:
            - .:/app
        networks:
            - shared
        extra_hosts:
            # s3.test resolves via Traefik on the host, so presigned MinIO URLs
            # are valid for both this container and the browser.
            - "s3.test:host-gateway"
        command: php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --workers=4 --max-requests=500
        labels:
            - traefik.enable=true
            - traefik.http.routers.inventory.rule=Host(`inventory.test`)
            - traefik.http.routers.inventory.entrypoints=web
            - traefik.http.services.inventory.loadbalancer.server.port=8000

networks:
    shared:
        external: true
